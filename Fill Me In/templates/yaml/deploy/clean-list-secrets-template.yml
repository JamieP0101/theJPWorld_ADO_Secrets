parameters:
- name: serviceConnection
  default: ''
- name: deploymentParameters
  default: ''
- name: keyvaultName
  default: ''
- name: deploymentName
  default: ''

steps:
  - task: AzureCLI@2
    displayName: ${{ parameters.deploymentName }}
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: 'pscore'
      scriptLocation: 'inlineScript'
      inlineScript: |
        $KeyVaultName = "${{ parameters.keyvaultName }}"
        $paramString = "${{ parameters.deploymentParameters }}"
        $paramPairs = $paramString -split '\s+' | Where-Object { $_ -match '=' }
        foreach ($pair in $paramPairs) {
          $splitPair = $pair -split '=', 2
          $name = $splitPair[0]
          $value = $splitPair[1]
          if ($value.StartsWith('"') -and $value.EndsWith('"')) {
            $value = $value.Substring(1, $value.Length - 2)
          }
        }
        $paramString = "${{ parameters.deploymentParameters }}"
        $paramPairs = $paramString -split '\s+' | Where-Object { $_ -match '=' }
        $paramSecretNames = @()
        foreach ($pair in $paramPairs) {
          $splitPair = $pair -split '=', 2
          $name = $splitPair[0]
          $paramSecretNames += $name
        }
        $allSecrets = az keyvault secret list --vault-name $KeyVaultName --query "[].name" -o tsv
        $secretsNotInParams = $allSecrets | Where-Object { $paramSecretNames -notcontains $_ }
        if ($secretsNotInParams) {
          Write-Host "Secrets in Key Vault but not in deploymentParameters:"
          $secretsNotInParams | ForEach-Object { Write-Host $_ }
        } else {
          Write-Host "All secrets in Key Vault are present in deploymentParameters."
        }